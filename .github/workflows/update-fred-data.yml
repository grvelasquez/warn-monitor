name: Update Daily Data (Lending + WARN)

on:
  schedule:
    # Runs at 7:00 AM UTC daily (midnight PT)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update-daily-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          
      - name: Fetch FRED lending data
        run: |
          python scripts/fetch_lending_data.py
          
      - name: Fetch WARN layoff data
        run: |
          python scripts/fetch_warn_data.py
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/lending_data.json public/data/warn_data.json
          git diff --staged --quiet || git commit -m "chore: Update daily data (lending + WARN) [automated]"
          git push
